<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" fill="url(#mainGradient)" rx="45"/>

  <!-- Top shine effect -->
  <ellipse cx="100" cy="40" rx="80" ry="35" fill="white" opacity="0.08"/>

  <!-- Main icon: Stylized medical cross + calendar -->
  <g filter="url(#softGlow)">
    <!-- Circle background for icon -->
    <circle cx="100" cy="100" r="72" fill="white" opacity="0.95"/>

    <!-- Medical Cross - Primary element -->
    <g fill="#1e40af">
      <!-- Vertical bar (thicker) -->
      <path d="M 85 55 C 83 55 82 56 82 58 L 82 142 C 82 144 83 145 85 145 L 115 145 C 117 145 118 144 118 142 L 118 58 C 118 56 117 55 115 55 L 85 55 Z" />
      <!-- Horizontal bar -->
      <path d="M 60 88 C 58 88 57 89 57 91 L 57 109 C 57 111 58 112 60 112 L 140 112 C 142 112 143 111 143 109 L 143 91 C 143 89 142 88 140 88 L 60 88 Z" />
    </g>

    <!-- Calendar accent (top-right corner) -->
    <g stroke="#2563eb" stroke-width="1.5" fill="none">
      <rect x="125" y="55" width="25" height="20" rx="2"/>
      <line x1="128" y1="59" x2="148" y2="59" stroke-width="1"/>
    </g>

    <!-- Heartbeat line (subtle accent bottom) -->
    <path d="M 65 155 Q 73 153 75 157 T 85 157 T 100 155 T 110 155" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative dots (subtle branding) -->
  <circle cx="25" cy="175" r="3" fill="white" opacity="0.4"/>
  <circle cx="175" cy="25" r="3" fill="white" opacity="0.4"/>
</svg>
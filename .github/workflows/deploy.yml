name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/conecta-saude:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/conecta-saude
            echo "Diretório conecta-saude pronto no servidor."

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "conecta-saude"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/conecta-saude
            
            # 1. Parar tudo primeiro para liberar RAM e espaço em disco
            echo "Parando containers atuais para liberar recursos..."
            docker compose down --remove-orphans || true
            docker rm -f conecta-saude || true
            
            # 2. Limpeza agressiva imediata
            echo "Limpando sistema Docker para liberar espaço..."
            docker system prune -af --volumes
            
            # 3. Mostrar espaço disponível após limpeza
            echo "Espaço em disco disponível:"
            df -h
            
            # 4. Login no Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 5. Criar arquivo .env limpo
            printf "DATABASE_URL=${{ secrets.DATABASE_URL }}\n" > .env
            printf "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}\n" >> .env
            printf "AUTH_SECRET=${{ secrets.AUTH_SECRET }}\n" >> .env
            printf "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}\n" >> .env
            printf "AUTH_TRUST_HOST=true\n" >> .env
            printf "DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/conecta-saude:latest\n" >> .env
            
            # 6. Pull da imagem (agora com espaço livre)
            echo "Baixando nova imagem..."
            docker compose pull
            
            # 7. Subir a aplicação
            echo "Subindo aplicação..."
            docker compose up -d
            
            echo "Deploy finalizado com sucesso."
